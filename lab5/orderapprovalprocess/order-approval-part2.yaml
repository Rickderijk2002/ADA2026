# Order Approval Process
main:
  params: [args]
  steps:
    - initGetInvURLVar:
        assign:
          - GetInvURL: ${"http://34.28.107.109:5000/products/" + args.pName}
    - checkInventory:
        call: http.get
        args:
          url: ${GetInvURL}
        result: GetInventoryRes
        next: returnOutput
    - returnOutput:
        return: ${GetInventoryRes.body.quantity}
